<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission JEET Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; background: #e5e7eb; border-radius: 0.5rem; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="app" class="max-w-5xl mx-auto p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">📚 Mission JEET</h1>
      <div id="auth-section">
        <button id="loginBtn" class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 text-sm font-medium">
          Login
        </button>
      </div>
    </div>

    <!-- Status -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6 border border-gray-100 text-sm text-gray-500">
      <span class="inline-block w-2 h-2 rounded-full bg-green-500 mr-2"></span>
      Proxy active — all API calls go through <code class="bg-gray-100 px-2 py-0.5 rounded text-xs">/api/mj/*</code>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6">
      <button class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium" data-tab="courses">Courses</button>
      <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium" data-tab="classes">Live Classes</button>
      <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium" data-tab="auth">Auth Test</button>
    </div>

    <!-- Tab: Courses -->
    <div id="tab-courses" class="tab-content">
      <div class="flex gap-2 mb-4">
        <input id="catId" type="text" placeholder="Category ID (optional)" class="border rounded-lg px-3 py-2 text-sm flex-1 max-w-xs">
        <button id="fetchCourses" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">
          Fetch Courses
        </button>
      </div>
      <div id="coursesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <!-- Tab: Live Classes -->
    <div id="tab-classes" class="tab-content hidden">
      <div class="flex gap-2 mb-4">
        <select id="classType" class="border rounded-lg px-3 py-2 text-sm">
          <option value="live">Live Now</option>
          <option value="upcoming">Upcoming</option>
          <option value="completed">Completed</option>
        </select>
        <input id="courseId" type="text" placeholder="Course ID (default: 177)" class="border rounded-lg px-3 py-2 text-sm w-32">
        <button id="fetchClasses" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">
          Fetch Classes
        </button>
      </div>
      <div id="classesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- Tab: Auth Test -->
    <div id="tab-auth" class="tab-content hidden">
      <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <h3 class="font-semibold mb-3">Test Authentication Flow</h3>
        <div class="space-y-3">
          <input id="authMobile" type="text" placeholder="Mobile number (10 digits)" class="border rounded-lg px-3 py-2 text-sm w-full max-w-xs">
          <button id="checkUser" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">
            Check User
          </button>
          <div id="authResult" class="mt-3 text-sm text-gray-600"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // API Client — Only knows about /api/mj/* paths
    // The real URLs (api.thescholarverse.site) are NEVER in this code
    // ============================================================
    const API = {
      prefix: '/api/mj',
      
      async get(path, params = {}) {
        const qs = new URLSearchParams(params).toString();
        const url = `${this.prefix}${path}${qs ? '?' + qs : ''}`;
        const res = await fetch(url);
        return res.json();
      }
    };

    // ============================================================
    // UI Helpers
    // ============================================================
    function $(id) { return document.getElementById(id); }
    function showEl(id) { $(id).classList.remove('hidden'); }
    function hideEl(id) { $(id).classList.add('hidden'); }

    function showLoading(containerId, count = 3) {
      const container = $(containerId);
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.className = 'skeleton h-32 w-full mb-3';
        container.appendChild(div);
      }
    }

    function createCourseCard(course) {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition';
      div.innerHTML = `
        <div class="font-semibold text-gray-800 mb-1">${course.title || 'Untitled Course'}</div>
        <div class="text-xs text-gray-400 mb-3">${course._id || ''}</div>
        ${course.price ? `<div class="text-lg font-bold text-indigo-600">₹${course.price}</div>` : ''}
        ${course.validity ? `<div class="text-xs text-gray-500">Valid: ${course.validity}</div>` : ''}
        ${course.badge ? `<span class="inline-block bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded mt-2">${course.badge}</span>` : ''}
      `;
      return div;
    }

    function createClassCard(cls) {
      const div = document.createElement('div');
      div.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition';
      const badge = cls.type === 'live' 
        ? '<span class="inline-block bg-red-100 text-red-700 text-xs px-2 py-0.5 rounded font-semibold animate-pulse">🔴 LIVE</span>'
        : cls.type === 'upcoming' 
          ? '<span class="inline-block bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded">⏰ Upcoming</span>'
          : '<span class="inline-block bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded">✅ Completed</span>';
      div.innerHTML = `
        ${cls.thumbnail ? `<img src="${cls.thumbnail}" class="w-full h-32 object-cover rounded-lg mb-3" />` : ''}
        <div class="flex justify-between items-start mb-2">
          <div class="font-semibold text-gray-800">${cls.title || 'Untitled Class'}</div>
          ${badge}
        </div>
        ${cls.start_date ? `<div class="text-xs text-gray-500">📅 ${new Date(cls.start_date).toLocaleDateString('en-IN')}</div>` : ''}
        ${cls.duration ? `<div class="text-xs text-gray-500">⏱ ${cls.duration}</div>` : ''}
      `;
      return div;
    }

    // ============================================================
    // Tab Switching
    // ============================================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-indigo-100', 'text-indigo-700'));
        btn.classList.add('active', 'bg-indigo-100', 'text-indigo-700');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        $(`tab-${btn.dataset.tab}`).classList.remove('hidden');
      });
    });
    // Set initial active style
    document.querySelector('.tab-btn.active')?.classList.add('bg-indigo-100', 'text-indigo-700');

    // ============================================================
    // 1. Courses
    // ============================================================
    $('fetchCourses').addEventListener('click', async () => {
      const catId = $('catId').value.trim();
      showLoading('coursesContainer', 6);
      try {
        const params = catId ? { cat_id: catId } : {};
        const data = await API.get('/course/all-course', params);
        const container = $('coursesContainer');
        container.innerHTML = '';
        if (data.success && data.data) {
          const courses = Array.isArray(data.data) ? data.data : (data.data.courses || data.data.list || []);
          if (courses.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">No courses found</div>';
          } else {
            courses.forEach(c => container.appendChild(createCourseCard(c)));
          }
        } else {
          container.innerHTML = `<div class="col-span-full text-center text-red-400 py-10">${data.message || 'Failed to fetch courses'}</div>`;
        }
      } catch (err) {
        $('coursesContainer').innerHTML = `<div class="col-span-full text-center text-red-400 py-10">Error: ${err.message}</div>`;
      }
    });

    // ============================================================
    // 2. Live Classes
    // ============================================================
    $('fetchClasses').addEventListener('click', async () => {
      const type = $('classType').value;
      const id = $('courseId').value.trim() || '177';
      showLoading('classesContainer', 4);
      try {
        const data = await API.get('/course/classes', { type, id });
        const container = $('classesContainer');
        container.innerHTML = '';
        if (data.success && data.data) {
          const classes = Array.isArray(data.data) ? data.data : [];
          if (classes.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">No classes found</div>';
          } else {
            classes.forEach(c => {
              c.type = type;
              container.appendChild(createClassCard(c));
            });
          }
        } else {
          container.innerHTML = `<div class="col-span-full text-center text-red-400 py-10">${data.message || 'Failed to fetch classes'}</div>`;
        }
      } catch (err) {
        $('classesContainer').innerHTML = `<div class="col-span-full text-center text-red-400 py-10">Error: ${err.message}</div>`;
      }
    });

    // ============================================================
    // 3. Auth Test
    // ============================================================
    $('checkUser').addEventListener('click', async () => {
      const mobile = $('authMobile').value.trim();
      if (!mobile || mobile.length < 10) {
        $('authResult').innerHTML = '<span class="text-red-500">Please enter a valid 10-digit mobile number</span>';
        return;
      }
      $('authResult').innerHTML = '<span class="text-gray-400">Checking user...</span>';
      try {
        const data = await API.get('/auth/check-user', { mobile, device_id: 'web-' + Date.now() });
        if (data.success) {
          const exists = data.data?.exists;
          $('authResult').innerHTML = exists 
            ? '<span class="text-green-600">✅ User exists — would proceed to OTP</span>'
            : '<span class="text-blue-600">🆕 New user — would proceed to name collection</span>';
        } else {
          $('authResult').innerHTML = `<span class="text-red-500">${data.message || 'Check failed'}</span>`;
        }
      } catch (err) {
        $('authResult').innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
      }
    });

    // Load courses on page load
    $('fetchCourses').click();
  </script>
</body>
</html>
