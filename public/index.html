<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholarVerse Proxy</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input, select, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 6px; font-size: 16px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    .video-container { margin: 20px 0; background: black; border-radius: 10px; overflow: hidden; }
    video { width: 100%; max-height: 520px; }
  </style>
</head>
<body>

<div class="container" id="loginScreen">
  <h2>Mobile OTP Login</h2>
  <input type="tel" id="mobile" placeholder="Enter 10-digit Mobile" maxlength="10"/>
  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpSection" style="display:none; margin-top:15px;">
    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6"/>
    <input type="text" id="name" placeholder="Your Name (Optional)" value="Guest"/>
    <button onclick="verifyOTP()">Verify OTP & Login</button>
  </div>
</div>

<div class="container" id="playerScreen" style="display:none;">
  <h1>ScholarVerse Video Proxy</h1>
  
  <div>
    <select id="courseId">
      <option value="151">Course 151</option>
      <option value="152">Course 152</option>
    </select>
    <input type="text" id="batchId" placeholder="Batch ID" value="1"/>
    <button onclick="loadVideo()">Load Video</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="info"></div>
  <div class="video-container"><video id="video" controls></video></div>

  <div>
    <label>Quality: </label>
    <select id="qualitySelect" onchange="changeQuality(this.value)"></select>
    
    <label style="margin-left:20px">Speed: </label>
    <select onchange="changeSpeed(this.value)">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
  </div>

  <div style="margin-top:20px;">
    <h3>Bookmarks</h3>
    <div id="bookmarks"></div>
    <button onclick="addBookmark()">Add Bookmark</button>
  </div>
</div>

<script>
  let hls = null;
  let currentTime = 0;
  let bookmarks = [];

  async function sendOTP() {
    const mobile = document.getElementById('mobile').value.trim();
    if (mobile.length !== 10) return alert("Enter valid 10-digit mobile number");

    const res = await fetch(`/api/check-user?mobile=${mobile}`);
    const data = await res.json();

    if (data.success) {
      document.getElementById('otpSection').style.display = 'block';
      alert("OTP Sent Successfully!");
    } else {
      alert(data.message || "Failed to send OTP");
    }
  }

  async function verifyOTP() {
    const mobile = document.getElementById('mobile').value;
    const otp = document.getElementById('otp').value;
    const name = document.getElementById('name').value || "Guest";

    const res = await fetch(`/api/verify-otp?mobile=${mobile}&otp=${otp}&name=${name}`);
    const data = await res.json();

    if (data.success && data.data?.accessToken) {
      localStorage.setItem("token", data.data.accessToken);
      alert("Login Successful!");
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('playerScreen').style.display = 'block';
    } else {
      alert(data.message || "Invalid OTP");
    }
  }

  async function loadVideo() {
    const courseId = document.getElementById('courseId').value;
    const batchId = document.getElementById('batchId').value;
    const token = localStorage.getItem('token');

    const res = await fetch(`/api/content/${courseId}?batch_id=${batchId}`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();
    const lesson = data.data;

    document.getElementById('info').innerHTML = `<h2>${lesson.title}</h2>`;

    const video = document.getElementById('video');
    const streamUrl = lesson.file_url || Object.values(lesson.download_urls || {})[0];

    if (hls) hls.destroy();

    if (streamUrl.includes('.m3u8') && Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => populateQualitySelector(hls));
    } else {
      video.src = streamUrl;
    }

    video.ontimeupdate = () => currentTime = video.currentTime;
  }

  function populateQualitySelector(hlsInstance) {
    const select = document.getElementById('qualitySelect');
    select.innerHTML = '<option value="-1">Auto</option>';
    hlsInstance.levels.forEach((level, i) => {
      select.appendChild(new Option(`${level.height}p`, i));
    });
  }

  function changeQuality(level) { if (hls) hls.currentLevel = parseInt(level); }
  function changeSpeed(speed) { document.getElementById('video').playbackRate = parseFloat(speed); }

  function addBookmark() {
    const title = prompt("Enter Bookmark Title:");
    if (title) {
      bookmarks.push({ time: currentTime, title });
      renderBookmarks();
    }
  }

  function renderBookmarks() {
    const div = document.getElementById('bookmarks');
    div.innerHTML = bookmarks.map((b, i) => `
      <div style="margin:5px 0;padding:8px;background:#f8f9fa;border-radius:6px;">
        ${Math.floor(b.time/60)}:${(b.time%60).toFixed(0).padStart(2,'0')} - ${b.title}
        <button onclick="seekTo(${b.time})">Play</button>
        <button onclick="deleteBookmark(${i})">Delete</button>
      </div>
    `).join('');
  }

  function seekTo(time) { document.getElementById('video').currentTime = time; }
  function deleteBookmark(i) { bookmarks.splice(i,1); renderBookmarks(); }
  function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
