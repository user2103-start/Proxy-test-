<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholarVerse Proxy</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 6px; font-size: 16px; }
    button { background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    .video-container { margin: 20px 0; background: black; border-radius: 10px; overflow: hidden; }
    video { width: 100%; max-height: 520px; }
  </style>
</head>
<body>

<div class="container" id="loginScreen">
  <h2>Login with Mobile + OTP</h2>
  <input type="tel" id="mobile" placeholder="Enter Mobile Number" maxlength="10"/>
  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpSection" style="display:none;">
    <input type="text" id="otp" placeholder="Enter OTP" maxlength="6"/>
    <button onclick="verifyOTP()">Verify OTP</button>
  </div>
</div>

<div class="container" id="playerScreen" style="display:none;">
  <h1>ScholarVerse Video Proxy</h1>
  
  <div>
    <select id="courseId">
      <option value="151">Course 151</option>
      <option value="152">Course 152</option>
    </select>
    <input type="text" id="batchId" placeholder="Batch ID" value="1"/>
    <button onclick="loadVideo()">Load Video</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="info"></div>
  <div class="video-container"><video id="video" controls></video></div>

  <div>
    <label>Quality: </label><select id="qualitySelect" onchange="changeQuality(this.value)"></select>
    <label style="margin-left:20px">Speed: </label>
    <select onchange="changeSpeed(this.value)">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
  </div>

  <div style="margin-top:20px;">
    <h3>Bookmarks</h3>
    <div id="bookmarks"></div>
    <button onclick="addBookmark()">Add Bookmark</button>
  </div>
</div>

<script>
  let hls = null;
  let currentTime = 0;
  let bookmarks = [];
  let currentMobile = "";

  async function sendOTP() {
    const mobile = document.getElementById('mobile').value.trim();
    if (mobile.length !== 10) return alert("Enter valid 10-digit mobile");

    currentMobile = mobile;

    try {
      const res = await fetch('/api/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mobile })
      });
      const data = await res.json();
      if (data.success || data.message?.toLowerCase().includes("sent")) {
        document.getElementById('otpSection').style.display = 'block';
        alert("OTP Sent!");
      } else {
        alert("Failed to send OTP: " + (data.message || "Try again"));
      }
    } catch (e) {
      alert("Network error");
    }
  }

  async function verifyOTP() {
    const otp = document.getElementById('otp').value.trim();
    if (otp.length !== 6) return alert("Enter 6-digit OTP");

    try {
      const res = await fetch('/api/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mobile: currentMobile, otp })
      });
      const data = await res.json();

      if (data.token) {
        localStorage.setItem('token', data.token);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('playerScreen').style.display = 'block';
        alert("Login Successful!");
      } else {
        alert("Invalid OTP");
      }
    } catch (e) {
      alert("Verification failed");
    }
  }

  // Rest of player code (loadVideo, etc.) remains same as before...
  // (I can give full code if needed)
</script>
</body>
</html>
