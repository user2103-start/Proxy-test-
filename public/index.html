<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Squad</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
:root {
  --bg:#f7f5f0;--surface:#ffffff;--surface2:#f0ede8;
  --border:#e8e4dc;--border2:#d4cfc6;
  --tp:#1a1612;--ts:#6b6560;--tm:#9b948c;
  --accent:#d97706;--accent2:#b45309;--accent-bg:#fef3c7;
  --blue:#2563eb;--green:#059669;--red:#dc2626;
  --radius:16px;--radius-sm:10px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.06);
  --shadow-md:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.08);
  --shadow-lg:0 4px 16px rgba(0,0,0,0.1),0 16px 48px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;-webkit-font-smoothing:antialiased;user-select:none;}

.page{display:none;min-height:100vh;animation:fadeUp 0.4s ease both;}
.page.active{display:block;}
#playerPage.active{display:flex;flex-direction:column;background:#000;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Your full CSS remains unchanged */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center;}
.login-logo-icon{font-size:2rem;}
.login-logo-text{font-family:'Instrument Serif',serif;font-size:1.6rem;color:var(--tp);}
.login-title{font-family:'Instrument Serif',serif;font-size:1.5rem;color:var(--tp);margin-bottom:8px;text-align:center;}
.login-sub{font-size:0.88rem;color:var(--ts);text-align:center;margin-bottom:28px;line-height:1.5;}
.input-group{margin-bottom:16px;}
.input-label{font-size:0.78rem;font-weight:600;color:var(--ts);margin-bottom:6px;display:block;letter-spacing:0.02em;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-prefix{position:absolute;left:14px;font-size:0.9rem;color:var(--ts);font-weight:500;pointer-events:none;}
.text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--tp);outline:none;transition:all 0.2s;}
.text-input.with-prefix{padding-left:48px;}
.text-input:focus{border-color:var(--accent);background:var(--surface);}
.text-input::placeholder{color:var(--tm);}
.otp-inputs{display:flex;gap:10px;justify-content:center;margin:8px 0;}
.otp-input{width:48px;height:52px;text-align:center;font-size:1.3rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:all 0.2s;font-family:'DM Sans',sans-serif;color:var(--tp);}
.otp-input:focus{border-color:var(--accent);background:var(--surface);}
.btn-full{width:100%;background:var(--tp);color:#fff;border:none;padding:14px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn-full:hover{background:#2d2925;}
.btn-full:disabled{opacity:0.5;cursor:not-allowed;}
.btn-ghost-sm{background:transparent;border:none;color:var(--blue);font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;padding:8px 0;display:block;text-align:center;width:100%;margin-top:8px;}
.login-error{font-size:0.82rem;color:var(--red);text-align:center;margin-top:8px;display:none;}
.login-info{font-size:0.82rem;color:var(--green);text-align:center;margin-top:8px;display:none;}
.timer-txt{font-size:0.8rem;color:var(--tm);text-align:center;margin-top:8px;}

/* Rest of your CSS (I kept it as is) */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0 0;}
.topbar-logo{font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--tp);display:flex;align-items:center;gap:8px;}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px;cursor:pointer;transition:all 0.2s;}
.user-chip:hover{border-color:var(--border2);}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;color:var(--accent2);}
.user-name{font-size:0.8rem;font-weight:500;color:var(--tp);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* ... (your full CSS continues) ... */
</style>
</head>
<body>

<!-- Your full HTML remains unchanged -->
<!-- SECURITY OVERLAY -->
<div id="secOverlay">
  <div style="font-size:2rem;">🔒</div>
  <div style="font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--tp);">Access Restricted</div>
  <div style="font-size:0.85rem;color:var(--ts);">Please close developer tools to continue.</div>
</div>

<!-- LOGIN PAGE -->
<div class="page active" id="loginPage">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🎯</div>
        <div class="login-logo-text">Study Squad</div>
      </div>

      <!-- Step 1: Mobile -->
      <div id="stepMobile">
        <div class="login-title">Welcome back</div>
        <div class="login-sub">Enter your mobile number to continue</div>
        <div class="input-group">
          <label class="input-label">Mobile Number</label>
          <div class="input-wrap">
            <span class="input-prefix">+91</span>
            <input class="text-input with-prefix" type="tel" id="mobileInput" placeholder="10-digit number" maxlength="10" inputmode="numeric"/>
          </div>
        </div>
        <div class="login-error" id="mobileError"></div>
        <button class="btn-full" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>
      </div>

      <!-- Step 2: OTP -->
      <div id="stepOTP" style="display:none;">
        <div class="login-title">Enter OTP</div>
        <div class="login-sub" id="otpSubText">We sent a code to your number</div>
        <div class="input-group">
          <label class="input-label" style="text-align:center;display:block;">Enter 6-digit OTP</label>
          <div class="otp-inputs">
            <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" id="o1"/>
            <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" id="o2"/>
            <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" id="o3"/>
            <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" id="o4"/>
            <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" id="o5"/>
            <input class="otp-input" type="tel" maxlength="1" inputmode="numeric" id="o6"/>
          </div>
        </div>
        <div class="login-error" id="otpError"></div>
        <div class="login-info" id="otpInfo"></div>
        <button class="btn-full" id="verifyOtpBtn" onclick="verifyOTP()">Verify & Continue</button>
        <div class="timer-txt" id="timerTxt">Resend in <span id="timerCount">30</span>s</div>
        <button class="btn-ghost-sm" id="resendBtn" style="display:none;" onclick="sendOTP()">Resend OTP</button>
        <button class="btn-ghost-sm" onclick="showStep('mobile')">← Change Number</button>
      </div>
    </div>
  </div>
</div>

<!-- Your other pages (landingPage, coursePage, playerPage) remain the same -->

<script>
// PROXY API CALLS
async function apiCall(endpoint, params = {}) {
  const query = new URLSearchParams(params).toString();
  try {
    const res = await fetch(`/api${endpoint}?${query}`);
    return await res.json();
  } catch (e) {
    console.error(e);
    return { success: false, message: "Network error. Check your internet." };
  }
}

// LOGIN FUNCTIONS
let currentMobile = "";

async function sendOTP() {
  const mobile = document.getElementById("mobileInput").value.trim();
  if (!/^[6-9]\d{9}$/.test(mobile)) {
    document.getElementById("mobileError").textContent = "Please enter a valid 10-digit mobile number.";
    document.getElementById("mobileError").style.display = "block";
    return;
  }
  currentMobile = mobile;
  const btn = document.getElementById("sendOtpBtn");
  btn.disabled = true; btn.textContent = "Sending...";

  const data = await apiCall("/send-otp", { mobile });

  btn.disabled = false; btn.textContent = "Send OTP";

  if (data.success) {
    document.getElementById("otpSubText").textContent = `Code sent to +91 ${mobile}`;
    showStep("otp");
    setupOTPInputs();
    startTimer();
  } else {
    document.getElementById("mobileError").textContent = data.message || "Failed to send OTP";
    document.getElementById("mobileError").style.display = "block";
  }
}

async function verifyOTP() {
  const otp = getOTP();
  if (otp.length !== 6) return;

  const btn = document.getElementById("verifyOtpBtn");
  btn.disabled = true; btn.textContent = "Verifying...";

  const data = await apiCall("/verify-otp", { mobile: currentMobile, otp });

  btn.disabled = false; btn.textContent = "Verify & Continue";

  if (data.success && data.data?.accessToken) {
    localStorage.setItem("token", data.data.accessToken);
    document.getElementById("otpInfo").textContent = "✓ Login successful!";
    document.getElementById("otpInfo").style.display = "block";
    setTimeout(() => {
      initLanding();
      showPage("landingPage");
    }, 800);
  } else {
    document.getElementById("otpError").textContent = data.message || "Invalid OTP";
    document.getElementById("otpError").style.display = "block";
  }
}

// Rest of your original script (showStep, setupOTPInputs, startTimer, initLanding, etc.) remains unchanged
// Just make sure you have the functions like showPage, initLanding, loadBatchCards, openCourse, etc. as in your original file.

</script>
</body>
</html>
