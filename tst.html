<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mission JEET</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root{
--bg:#071018;
--card:#101827;
--border:rgba(255,255,255,.08);
--text:#fff;
--muted:#9aa4b2;
--primary:#6d7cff;
--danger:#ff5d73;
--success:#29d391;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#071018,#0f172a);
color:white;
min-height:100vh;
}

.hidden{
display:none!important;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
}

button,input,select{
border:none;
outline:none;
border-radius:14px;
padding:14px;
}

button{
cursor:pointer;
font-weight:700;
}

.primary-btn{
background:linear-gradient(135deg,#6d7cff,#8f5eff);
color:white;
}

.danger-btn{
background:#ff5d73;
color:white;
}

.auth{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.auth-card{
width:100%;
max-width:420px;
padding:28px;
border-radius:28px;
}

.auth-card h1{
font-size:34px;
margin-bottom:10px;
}

.auth-card p{
color:var(--muted);
margin-bottom:20px;
}

.auth-card input{
width:100%;
margin-bottom:14px;
background:#ffffff10;
color:white;
}

.auth-card button{
width:100%;
margin-top:10px;
}

.topbar{
position:sticky;
top:0;
z-index:99;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.dashboard{
padding:16px;
padding-bottom:120px;
}

.course-banner{
padding:24px;
border-radius:28px;
margin-top:16px;
}

.badge{
display:inline-flex;
padding:8px 14px;
background:#ffffff15;
border-radius:999px;
margin-bottom:12px;
}

.tabs{
display:flex;
gap:10px;
margin-top:18px;
overflow:auto;
}

.tabs button{
background:#ffffff10;
color:white;
min-width:120px;
}

.tabs button.active{
background:#6d7cff;
}

.content-list{
display:grid;
gap:16px;
margin-top:18px;
}

.content-card{
padding:18px;
border-radius:22px;
cursor:pointer;
transition:.2s;
}

.content-card:hover{
transform:translateY(-2px);
}

.content-card h3{
font-size:18px;
margin-bottom:10px;
}

.label{
display:inline-flex;
padding:6px 12px;
border-radius:999px;
font-size:13px;
margin-top:12px;
}

.live{
background:#ff5d7320;
color:#ff8da0;
animation:pulse 1.2s infinite;
}

.recorded{
background:#29d39120;
color:#67ffc2;
}

.upcoming{
background:#ffe66620;
color:#ffe666;
}

.pdf{
background:#5da9ff20;
color:#88c4ff;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}
}

.toast{
position:fixed;
top:20px;
right:20px;
padding:14px 18px;
border-radius:14px;
z-index:99999;
font-weight:700;
}

.success{
background:#29d391;
}

.error{
background:#ff5d73;
}

#playerModal{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:none;
overflow:auto;
padding:20px;
}

.player-wrapper{
max-width:1200px;
margin:auto;
}

video{
width:100%;
border-radius:22px;
background:black;
}

.player-controls{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:14px;
}

.player-controls button,
.player-controls select{
background:#ffffff10;
color:white;
}

.chat-box{
margin-top:24px;
padding:18px;
border-radius:24px;
}

.chat-messages{
height:240px;
overflow-y:auto;
margin:16px 0;
display:flex;
flex-direction:column;
gap:10px;
}

.chat-bubble{
padding:12px;
border-radius:14px;
background:#ffffff10;
}

.chat-input{
display:flex;
gap:10px;
}

.chat-input input{
flex:1;
background:#ffffff10;
color:white;
}

.emoji-bar{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.emoji-btn{
padding:10px 14px;
background:#ffffff10;
color:white;
}

@media(max-width:768px){

.player-controls{
grid-template-columns:1fr 1fr;
}

.tabs{
padding-bottom:4px;
}

}
</style>
</head>
<body>

<div id="toastContainer"></div>

<!-- LOGIN -->
<section class="auth" id="authScreen">
<div class="auth-card glass">

<h1>Mission JEET</h1>
<p>Modern Learning Platform</p>

<input type="tel" id="mobileInput" placeholder="Enter Mobile Number" maxlength="10"/>

<input type="number" id="otpInput" placeholder="Enter OTP" maxlength="6" class="hidden"/>

<button class="primary-btn" id="sendOtpBtn">
Send OTP
</button>

<button class="primary-btn hidden" id="verifyOtpBtn">
Verify OTP
</button>

<p id="timerText"></p>

</div>
</section>

<!-- DASHBOARD -->
<section id="dashboardScreen" class="hidden">

<header class="topbar glass">

<div>
<h2>Mission JEET</h2>
<small id="userBadge">Student</small>
</div>

<button class="danger-btn" onclick="logout()">
Logout
</button>

</header>

<div class="dashboard">

<div class="course-banner glass">

<div class="badge">
PRARAMBH
</div>

<h1 id="courseTitle">
Loading...
</h1>

<p id="courseDescription" style="margin-top:10px;color:#9aa4b2">
Please wait...
</p>

</div>

<div class="tabs">
<button class="tab-btn active" data-tab="content">
Content
</button>

<button class="tab-btn" data-tab="live">
Live
</button>

<button class="tab-btn" data-tab="upcoming">
Upcoming
</button>
</div>

<div class="content-list" id="contentList"></div>

</div>
</section>

<!-- PLAYER -->
<div id="playerModal">

<div class="player-wrapper">

<button class="danger-btn" onclick="closePlayer()">
Close Player
</button>

<h2 id="videoTitle" style="margin:16px 0"></h2>

<video id="videoPlayer" controls playsinline></video>

<div class="player-controls">

<select id="qualitySelector">
<option>Auto</option>
</select>

<select id="speedSelector">
<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>

<button id="fullscreenBtn">
Fullscreen
</button>

<button id="downloadBtn">
Download
</button>

</div>

<!-- CHAT -->
<div class="chat-box glass">

<h3>Live Chat</h3>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input">

<input id="chatInput" placeholder="Type message"/>

<button class="primary-btn" id="sendChatBtn">
Send
</button>

</div>

<div class="emoji-bar" id="emojiBar"></div>

</div>

</div>

</div>

<script>
const BASE_URL = "https://YOUR-DOMAIN/api/proxy";
const COURSE_ID = 151;

const ALLOWED_EMOJIS = {
smile:"😊",
thumbsup:"👍",
question:"❓",
fire:"🔥",
heart:"❤️",
clap:"👏",
rocket:"🚀",
book:"📚",
video:"🎬",
pdf:"📄"
};

const Storage = {
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
get:(k)=>{
const v=localStorage.getItem(k);
try{return JSON.parse(v)}catch{return v}
},
remove:(k)=>localStorage.removeItem(k),
clear:()=>{
[
'accessToken',
'refreshToken',
'tokenExpiry',
'userId',
'currentVideo'
].forEach(k=>localStorage.removeItem(k));
}
};

function toast(msg,type='success'){
const el=document.createElement('div');
el.className=`toast ${type}`;
el.innerText=msg;
document.body.appendChild(el);
setTimeout(()=>el.remove(),3000);
}

async function api(action,method='GET',body=null,query=''){

const headers={
'Content-Type':'application/json'
};

const accessToken=Storage.get('accessToken');
const refreshToken=Storage.get('refreshToken');

if(accessToken){
headers.Authorization=accessToken;
}

if(refreshToken){
headers['X-Refresh-Token']=refreshToken;
}

const response=await fetch(
`${BASE_URL}?action=${action}${query}`,
{
method,
headers,
body:body?JSON.stringify(body):undefined
}
);

const data=await response.json();

if(response.status===401){
await refreshAccessToken();
return api(action,method,body,query);
}

if(!response.ok){
throw new Error(data.error||'Request Failed');
}

return data;
}

async function refreshAccessToken(){

const refreshToken=Storage.get('refreshToken');

if(!refreshToken){
logout();
return;
}

try{

const response=await fetch(
`${BASE_URL}?action=refresh`,
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
refreshToken
})
}
);

const data=await response.json();

if(data.success){

Storage.set('accessToken',data.accessToken);
Storage.set('tokenExpiry',data.expiresIn);

}else{
logout();
}

}catch{
logout();
}
}

function validateSession(){

const token=Storage.get('accessToken');
const expiry=Storage.get('tokenExpiry');

if(!token || !expiry){
return false;
}

const now=Date.now();
const fiveMin=5*60*1000;

if(now>=(expiry-fiveMin)){
refreshAccessToken();
}

return true;
}

const authScreen=document.getElementById('authScreen');
const dashboardScreen=document.getElementById('dashboardScreen');

if(validateSession()){

authScreen.classList.add('hidden');
dashboardScreen.classList.remove('hidden');

loadDashboard();

}

document.getElementById('sendOtpBtn').onclick=async()=>{

try{

const mobile=document.getElementById('mobileInput').value.trim();

if(mobile.length!==10){
return toast('Invalid Mobile Number','error');
}

document.getElementById('sendOtpBtn').innerText='Sending...';

await api(
'sendotp',
'POST',
{mobile}
);

document.getElementById('otpInput').classList.remove('hidden');
document.getElementById('verifyOtpBtn').classList.remove('hidden');

toast('OTP Sent');

startTimer();

}catch(e){
toast(e.message,'error');
}

document.getElementById('sendOtpBtn').innerText='Send OTP';

};

document.getElementById('verifyOtpBtn').onclick=async()=>{

try{

const mobile=document.getElementById('mobileInput').value.trim();
const otp=document.getElementById('otpInput').value.trim();

document.getElementById('verifyOtpBtn').innerText='Verifying...';

const data=await api(
'verifyotp',
'POST',
{
mobile,
otp
}
);

Storage.set('accessToken',data.accessToken);
Storage.set('refreshToken',data.refreshToken);
Storage.set('tokenExpiry',data.expiresIn);
Storage.set('userId',data.userId);

toast('Login Successful');

authScreen.classList.add('hidden');
dashboardScreen.classList.remove('hidden');

loadDashboard();

}catch(e){
toast(e.message,'error');
}

document.getElementById('verifyOtpBtn').innerText='Verify OTP';

};

function startTimer(){

let sec=30;

const timer=document.getElementById('timerText');

const interval=setInterval(()=>{

timer.innerText=`Resend OTP in ${sec}s`;

sec--;

if(sec<0){

clearInterval(interval);
timer.innerText='';

}

},1000);

}

async function loadDashboard(){

try{

const course=await api(
'course',
'GET',
null,
`&course_id=${COURSE_ID}`
);

document.getElementById('courseTitle').innerText=
course.data?.title || 'Mission JEET';

document.getElementById('courseDescription').innerText=
course.data?.description || 'Learning Platform';

const content=await api(
'content',
'GET',
null,
`&course_id=${COURSE_ID}`
);

window.ALL_CONTENT=content.data || [];

renderContent('content');

}catch(e){
toast(e.message,'error');
}

}

function renderContent(type){

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.classList.remove('active');
});

document.querySelector(`[data-tab="${type}"]`)
.classList.add('active');

const list=document.getElementById('contentList');

list.innerHTML='';

let filtered=[...window.ALL_CONTENT];

if(type==='live'){

filtered=filtered.filter(i=>
i.data?.file_type===2 &&
i.data?.video_type===3 &&
i.data?.is_live===1
);

}

if(type==='upcoming'){

filtered=filtered.filter(i=>
i.data?.file_type===2 &&
i.data?.video_type===3 &&
i.data?.is_live===0
);

}

filtered.forEach(item=>{

const div=document.createElement('div');

div.className='content-card glass';

let label='Recorded';
let className='recorded';

if(
item.data?.file_type===2 &&
item.data?.video_type===3 &&
item.data?.is_live===1
){
label='LIVE';
className='live';
}

if(
item.data?.file_type===2 &&
item.data?.video_type===3 &&
item.data?.is_live===0
){
label='UPCOMING';
className='upcoming';
}

if(
item.data?.file_type===1 ||
item.data?.file_type===5
){
label='PDF';
className='pdf';
}

div.innerHTML=`
<h3>${item.title}</h3>
<div class="label ${className}">
${label}
</div>
`;

div.onclick=()=>openContent(item);

list.appendChild(div);

});

}

document.querySelectorAll('.tab-btn').forEach(btn=>{

btn.onclick=()=>{

renderContent(btn.dataset.tab);

};

});

async function openContent(item){

try{

const data=await api(
'video',
'GET',
null,
`&content_id=${item.id}&course_id=${COURSE_ID}`
);

const content=data.data;

if(content.playerType==='pdf'){

window.open(content.viewerUrl,'_blank');
return;

}

Storage.set('currentVideo',content);

openPlayer(content);

}catch(e){
toast(e.message,'error');
}

}

let hls;

function openPlayer(videoData){

document.getElementById('playerModal').style.display='block';

document.getElementById('videoTitle').innerText=
videoData.title;

const video=document.getElementById('videoPlayer');

if(Hls.isSupported()){

hls=new Hls();

hls.loadSource(videoData.file_url);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

const quality=document.getElementById('qualitySelector');

quality.innerHTML='';

const auto=document.createElement('option');
auto.value=-1;
auto.innerText='Auto';
quality.appendChild(auto);

hls.levels.forEach((level,index)=>{

const op=document.createElement('option');

op.value=index;
op.innerText=level.height+'p';

quality.appendChild(op);

});

const saved=
localStorage.getItem('progress_'+videoData.id);

if(saved){
video.currentTime=Number(saved);
}

});

}else{

video.src=videoData.file_url;

}

video.play();

video.ontimeupdate=()=>{

localStorage.setItem(
'progress_'+videoData.id,
video.currentTime
);

};

document.getElementById('qualitySelector').onchange=e=>{

if(hls){
hls.currentLevel=Number(e.target.value);
}

};

document.getElementById('speedSelector').onchange=e=>{

video.playbackRate=Number(e.target.value);

};

document.getElementById('fullscreenBtn').onclick=()=>{

video.requestFullscreen();

};

document.getElementById('downloadBtn').onclick=()=>{

window.open(videoData.file_url,'_blank');

};

setupChat(videoData);

}

function closePlayer(){

document.getElementById('playerModal').style.display='none';

const video=document.getElementById('videoPlayer');

video.pause();

if(hls){
hls.destroy();
}

}

function setupChat(videoData){

const emojiBar=document.getElementById('emojiBar');
const chat=document.getElementById('chatMessages');

emojiBar.innerHTML='';
chat.innerHTML='';

Object.values(ALLOWED_EMOJIS).forEach(emoji=>{

const btn=document.createElement('button');

btn.className='emoji-btn';
btn.innerText=emoji;

btn.onclick=()=>{

document.getElementById('chatInput').value+=emoji;

};

emojiBar.appendChild(btn);

});

appendChat(
'SYSTEM',
'MQTT Ready: '+
(videoData.mqtt_live_cred?.public_chat_node || 'Unavailable')
);

document.getElementById('sendChatBtn').onclick=()=>{

const input=document.getElementById('chatInput');

if(!input.value.trim()) return;

appendChat(
'YOU',
input.value
);

input.value='';

};

}

function appendChat(user,msg){

const div=document.createElement('div');

div.className='chat-bubble';

div.innerHTML=`
<b>${user}</b>
<br>
${msg}
`;

const chat=document.getElementById('chatMessages');

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function logout(){

Storage.clear();

location.reload();

}
</script>

</body>
</html>
