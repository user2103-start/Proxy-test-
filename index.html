<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mission JEET</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* ALL CSS HERE */
body{margin:0;background:#071018;color:#fff;font-family:Arial}
.hidden{display:none}
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08)}
input,button,select{padding:14px;border:none;border-radius:12px}
button{cursor:pointer}
#authScreen{display:flex;justify-content:center;align-items:center;height:100vh}
.auth-card{width:90%;max-width:400px;padding:24px;border-radius:24px}
#dashboard{padding:16px}
.content-card{padding:16px;border-radius:18px;margin-top:14px}
#playerModal{position:fixed;inset:0;background:#000;z-index:999;display:none;padding:20px;overflow:auto}
video{width:100%;border-radius:20px;background:#000}
.chat-box{margin-top:20px;padding:16px;border-radius:20px}
.chat-messages{height:220px;overflow:auto;margin:12px 0}
.chat-bubble{padding:10px;border-radius:12px;background:#ffffff12;margin-top:8px}
.toast{position:fixed;top:20px;right:20px;padding:14px;border-radius:12px;z-index:9999}
.success{background:#29d391}.error{background:#ff5d73}
</style>
</head>
<body>

<div id="toastContainer"></div>

<!-- LOGIN -->
<section id="authScreen">
<div class="auth-card glass">
<h1>Mission JEET</h1>
<p>Modern Learning Platform</p>

<input id="mobileInput" placeholder="Mobile Number" maxlength="10" />
<input id="otpInput" class="hidden" placeholder="OTP" maxlength="6" />

<button id="sendOtpBtn">Send OTP</button>
<button id="verifyOtpBtn" class="hidden">Verify OTP</button>

<p id="timerText"></p>
</div>
</section>

<!-- DASHBOARD -->
<section id="dashboardScreen" class="hidden">
<div id="dashboard">
<div class="glass" style="padding:20px;border-radius:24px">
<h1 id="courseTitle">Mission JEET</h1>
<p id="courseDescription">Loading...</p>
</div>

<div style="display:flex;gap:10px;margin-top:16px">
<button class="tab-btn" data-tab="content">Content</button>
<button class="tab-btn" data-tab="live">Live</button>
<button class="tab-btn" data-tab="upcoming">Upcoming</button>
<button onclick="logout()">Logout</button>
</div>

<div id="contentList"></div>
</div>
</section>

<!-- PLAYER -->
<div id="playerModal">
<button onclick="closePlayer()">Close</button>
<h2 id="videoTitle"></h2>

<video id="videoPlayer" controls playsinline></video>

<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-top:12px">
<select id="qualitySelector"></select>
<select id="speedSelector">
<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>
<button id="fullscreenBtn">Fullscreen</button>
<button id="downloadBtn">Download</button>
</div>

<div class="chat-box glass">
<h3>Live Chat</h3>
<div class="chat-messages" id="chatMessages"></div>
<input id="chatInput" placeholder="Message" />
<div id="emojiBar"></div>
<button id="sendChatBtn">Send</button>
</div>
</div>

<script type="module">
const BASE_URL = "https://proxy-test-three.vercel.app/";
const COURSE_ID = 151;

const ALLOWED_EMOJIS = {
smile:"😊",
thumbsup:"👍",
question:"❓",
fire:"🔥",
heart:"❤️",
clap:"👏",
rocket:"🚀",
book:"📚",
video:"🎬",
pdf:"📄"
};

const Storage = {
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
get:(k)=>{
const v=localStorage.getItem(k);
try{return JSON.parse(v)}catch{return v}
},
remove:(k)=>localStorage.removeItem(k),
clear:()=>{
['accessToken','refreshToken','tokenExpiry','userId','currentVideo'].forEach(localStorage.removeItem.bind(localStorage));
}
};

function toast(msg,type='success'){
const el=document.createElement('div');
el.className=`toast ${type}`;
el.innerText=msg;
document.body.appendChild(el);
setTimeout(()=>el.remove(),3000);
}

async function api(action,method='GET',body=null,query=''){
const headers={'Content-Type':'application/json'};
const accessToken=Storage.get('accessToken');
const refreshToken=Storage.get('refreshToken');

if(accessToken) headers.Authorization=accessToken;
if(refreshToken) headers['X-Refresh-Token']=refreshToken;

const res=await fetch(`${BASE_URL}?action=${action}${query}`,{
method,
headers,
body:body?JSON.stringify(body):undefined
});

const data=await res.json();
if(!res.ok) throw new Error(data.error||'Failed');
return data;
}

const authScreen=document.getElementById('authScreen');
const dashboardScreen=document.getElementById('dashboardScreen');

if(Storage.get('accessToken')){
authScreen.classList.add('hidden');
dashboardScreen.classList.remove('hidden');
loadDashboard();
}

document.getElementById('sendOtpBtn').onclick=async()=>{
try{
const mobile=mobileInput.value.trim();
await api('sendotp','POST',{mobile});
otpInput.classList.remove('hidden');
verifyOtpBtn.classList.remove('hidden');
toast('OTP Sent');
}catch(e){toast(e.message,'error')}
};

document.getElementById('verifyOtpBtn').onclick=async()=>{
try{
const mobile=mobileInput.value.trim();
const otp=otpInput.value.trim();
const data=await api('verifyotp','POST',{mobile,otp});

Storage.set('accessToken',data.accessToken);
Storage.set('refreshToken',data.refreshToken);
Storage.set('tokenExpiry',data.expiresIn);
Storage.set('userId',data.userId);

authScreen.classList.add('hidden');
dashboardScreen.classList.remove('hidden');

loadDashboard();
}catch(e){toast(e.message,'error')}
};

async function loadDashboard(){
try{
const course=await api('course','GET',null,`&course_id=${COURSE_ID}`);
courseTitle.innerText=course.data?.title||'Mission JEET';
courseDescription.innerText=course.data?.description||'Learning Platform';

const content=await api('content','GET',null,`&course_id=${COURSE_ID}`);
window.allContent=content.data||[];
renderContent('content');
}catch(e){toast(e.message,'error')}
}

function renderContent(type){
contentList.innerHTML='';

let filtered=window.allContent;

if(type==='live'){
filtered=filtered.filter(i=>i.data?.file_type===2&&i.data?.video_type===3&&i.data?.is_live===1);
}

if(type==='upcoming'){
filtered=filtered.filter(i=>i.data?.file_type===2&&i.data?.video_type===3&&i.data?.is_live===0);
}

filtered.forEach(item=>{
const div=document.createElement('div');
div.className='content-card glass';

let label='Recorded';
if(item.data?.file_type===1||item.data?.file_type===5) label='PDF';
if(item.data?.video_type===3&&item.data?.is_live===1) label='LIVE';
if(item.data?.video_type===3&&item.data?.is_live===0) label='UPCOMING';

 div.innerHTML=`<h3>${item.title}</h3><p>${label}</p>`;
 div.onclick=()=>openContent(item);
 contentList.appendChild(div);
});
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.onclick=()=>renderContent(btn.dataset.tab);
});

async function openContent(item){
try{
const data=await api('video','GET',null,`&content_id=${item.id}&course_id=${COURSE_ID}`);
const video=data.data;

if(video.playerType==='pdf'){
window.open(video.viewerUrl,'_blank');
return;
}

Storage.set('currentVideo',video);
openPlayer(video);
}catch(e){toast(e.message,'error')}
}

let hls;

function openPlayer(videoData){
playerModal.style.display='block';
videoTitle.innerText=videoData.title;

const video=document.getElementById('videoPlayer');

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(videoData.file_url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
qualitySelector.innerHTML='<option value="-1">Auto</option>';

hls.levels.forEach((l,i)=>{
const op=document.createElement('option');
op.value=i;
op.innerText=l.height+'p';
qualitySelector.appendChild(op);
});

const saved=localStorage.getItem('progress_'+videoData.id);
if(saved) video.currentTime=Number(saved);
});
}else{
video.src=videoData.file_url;
}

video.ontimeupdate=()=>{
localStorage.setItem('progress_'+videoData.id,video.currentTime);
};

qualitySelector.onchange=e=>{
hls.currentLevel=Number(e.target.value);
};

speedSelector.onchange=e=>{
video.playbackRate=Number(e.target.value);
};

fullscreenBtn.onclick=()=>video.requestFullscreen();

downloadBtn.onclick=()=>window.open(videoData.file_url,'_blank');

setupChat(videoData);
}

window.closePlayer=()=>{
playerModal.style.display='none';
videoPlayer.pause();
};

function setupChat(videoData){
emojiBar.innerHTML='';
chatMessages.innerHTML='';

Object.values(ALLOWED_EMOJIS).forEach(e=>{
const btn=document.createElement('button');
btn.className='emoji-btn';
btn.innerText=e;
btn.onclick=()=>chatInput.value+=e;
emojiBar.appendChild(btn);
});

appendChat('System','MQTT Ready: '+(videoData.mqtt_live_cred?.public_chat_node||'No Node'));

sendChatBtn.onclick=()=>{
if(!chatInput.value.trim()) return;
appendChat('You',chatInput.value);
chatInput.value='';
};
}

function appendChat(user,msg){
const div=document.createElement('div');
div.className='chat-bubble';
div.innerHTML=`<b>${user}</b><br>${msg}`;
chatMessages.appendChild(div);
chatMessages.scrollTop=chatMessages.scrollHeight;
}

window.logout=()=>{
Storage.clear();
location.reload();
};
</script>
</body>
</html>
