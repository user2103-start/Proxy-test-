<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Lecture Dashboard</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        /* Prevent mobile browser viewport shifting */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: grid;
            grid-template-rows: 50px 1fr;
        }

        header {
            background-color: var(--card-bg);
            padding: 0 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50%;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            background-color: #334155;
            color: white;
            text-align: center;
        }

        /* Main Workspace Window Layout */
        .dashboard-container {
            display: grid;
            grid-template-rows: 40vh 1fr; /* Top video box, bottom chat box for portrait view */
            height: 100%;
            overflow: hidden;
        }

        @media (min-width: 992px) {
            .dashboard-container {
                grid-template-rows: 1fr;
                grid-template-columns: 3fr 1fr;
            }
        }

        /* Video / Thumbnail Stack Holder Section */
        .video-section {
            background-color: #000;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* Class Thumbnail Layer Overlay */
        .thumbnail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 10; /* Cover the player entirely */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .thumbnail-blur-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .waiting-box {
            position: relative;
            z-index: 2;
            background: rgba(30, 41, 59, 0.9);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 80%;
        }

        .waiting-box h3 { margin: 0 0 8px 0; color: white;}
        .waiting-box p { margin: 0; color: var(--text-muted); font-size: 0.9rem;}

        /* Strict Chat Grid Layout Engine */
        .chat-section {
            background-color: var(--card-bg);
            border-top: 1px solid #334155;
            display: grid;
            grid-template-rows: auto 1fr auto; /* Static Head, Fluid Messages, Pinned Input */
            height: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        @media (min-width: 992px) {
            .chat-section {
                border-top: none;
                border-left: 1px solid #334155;
            }
        }

        .chat-header {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background-color: #94a3b8;
            border-radius: 50%;
            display: inline-block;
        }

        .chat-messages {
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
        }

        .message {
            font-size: 0.9rem;
            background: #273549;
            padding: 8px 12px;
            border-radius: 8px;
            word-break: break-word;
        }

        .message .username {
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 3px;
        }

        /* Pinned Bottom Input Row fixed layout */
        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #334155;
            background-color: var(--card-bg);
            display: flex;
            gap: 10px;
            box-sizing: border-box;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input-area input:focus {
            border-color: var(--accent-color);
        }

        .chat-input-area button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="video-title">Motion in a Plane | L4</h1>
        <div class="status-badge" id="stream-status">Calculating Schedule...</div>
    </header>

    <div class="dashboard-container">
        
        <div class="video-section">
            
            <div class="thumbnail-overlay" id="thumb-layer">
                <div class="thumbnail-blur-bg"></div>
                <div class="waiting-box">
                    <h3 id="wait-headline">Class Has Not Started</h3>
                    <p id="wait-subtext">Waiting for broadcast scheduling anchor...</p>
                </div>
            </div>

            <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                <p class="vjs-no-js">To view this video please enable JavaScript</p>
            </video>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <span class="live-indicator" id="chat-indicator"></span> <span id="chat-title-text">Live Chat</span>
            </div>
            
            <div class="chat-messages" id="chat-box">
                <div class="message">
                    <div class="username">System</div>
                    Verifying student environment variables...
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <script>
        // Core Configuration Maps from your payloads
        const AUTH_CONFIG = {
            appId: "1772100600",
            deviceId: "2cfdeaea-ab62-41f8-9f7d-6568334e1826",
            token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjozMjMwNTYxLCJhcHBfaWQiOiIxNzcyMTAwNjAwIiwiZGV2aWNlX2lkIjoiMmNmZGVhZWEtYWI2Mi00MWY4LTlmN2QtNjU2ODMzNGUxODI2IiwicGxhdGZvcm0iOiIzIiwidXNlcl90eXBlIjoxLCJpYXQiOjE3Nzk4ODU3MzAsImV4cCI6MTc4MjQ3NzczMH0.AeKMUiNGAeqXkMixTmyd6j6HM3gauNyafeba3fvPvWg",
            userId: "3230561"
        };

        const STREAM_CONFIG = {
            title: "Motion in a Plane | L4",
            streamUrl: "https://d1oxe6vjn5slmc.cloudfront.net/out/v1/f7f2b29f63794f35aac79a815cd24829/index.m3u8",
            thumbnailUrl: "https://dylnd2lqy6eys.cloudfront.net/1770981347/admin_v2/content/thumbnail/6375493_148_App%20Thumbnails%202026%20%283%29.png",
            mqttHost: "mqtt-ws.nexttoppers.com",
            publicTopic: "177995853518121_public",
            
            // Timing variables parsed out of your raw JSON
            liveFrom: 1779978600, 
            liveTo: 1779989400
        };

        let currentStudent = { name: "Student", id: AUTH_CONFIG.userId };
        let mqttClient;
        let isLiveActive = false; // Internal tracking state variable

        // Set static configuration visual points
        document.getElementById('video-title').innerText = STREAM_CONFIG.title;
        document.getElementById('thumb-layer').style.backgroundImage = `url('${STREAM_CONFIG.thumbnailUrl}')`;

        // Initialize VideoJS Player 
        const player = videojs('live-player');
        player.src({ src: STREAM_CONFIG.streamUrl, type: 'application/x-mpegURL' });

        // 1. Time Converter & Countdown State Loop Engine
        function formatToIST(unixTimestamp) {
            const date = new Date(unixTimestamp * 1000);
            return date.toLocaleTimeString('en-IN', {
                timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true
            });
        }

        function calculateTimelineClock() {
            const statusBadge = document.getElementById('stream-status');
            const thumbLayer = document.getElementById('thumb-layer');
            const chatIndicator = document.getElementById('chat-indicator');
            const chatTitleText = document.getElementById('chat-title-text');
            
            const currentTime = Math.floor(Date.now() / 1000); // Current unix epoch time
            
            const startTimeIST = formatToIST(STREAM_CONFIG.liveFrom);
            const endTimeIST = formatToIST(STREAM_CONFIG.liveTo);

            if (currentTime < STREAM_CONFIG.liveFrom) {
                // Scenario A: Class is scheduled for the future
                isLiveActive = false;
                const delta = STREAM_CONFIG.liveFrom - currentTime;
                const mins = Math.floor((delta % 3600) / 60);
                const hrs = Math.floor(delta / 3600);
                const countdownString = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;

                statusBadge.innerText = `UPCOMING LECTURE • Scheduled at ${startTimeIST}`;
                statusBadge.style.color = "#f59e0b";
                
                // Show Thumbnail Mask Cover
                thumbLayer.style.display = "flex";
                document.getElementById('wait-headline').innerText = "Class Starts Soon";
                document.getElementById('wait-subtext').innerText = `Live stream starts at ${startTimeIST} (In ${countdownString})`;
                
                // Keep Chat Badge Inactive
                chatIndicator.style.backgroundColor = "#64748b";
                chatIndicator.style.animation = "none";
                chatTitleText.innerText = "Live Chat (Offline)";

            } else if (currentTime >= STREAM_CONFIG.liveFrom && currentTime <= STREAM_CONFIG.liveTo) {
                // Scenario B: Clock inside live window constraints
                statusBadge.innerText = `● LIVE NOW (Ends at ${endTimeIST})`;
                statusBadge.style.color = "#22c55e";
                
                // HIDE THUMBNAIL OVERLAY -> Reveal Player View canvas
                thumbLayer.style.display = "none";

                // Turn on blinking live chat indicator ring
                chatIndicator.style.backgroundColor = "#ef4444";
                chatIndicator.style.animation = "blink 1.5s infinite";
                chatTitleText.innerText = "Live Chat";

                if (!isLiveActive) {
                    isLiveActive = true;
                    appendSystemMessage("Schedule checkpoint reached. Initializing secure live messaging channel...");
                    connectToLiveChat();
                }
            } else {
                // Scenario C: Stream window timeframe expired
                isLiveActive = false;
                statusBadge.innerText = `CLASS ARCHIVED • Ended at ${endTimeIST}`;
                statusBadge.style.color = "#94a3b8";
                
                // Remove thumbnail mask, let them play the final stream backup archive
                thumbLayer.style.display = "none";
                chatIndicator.style.backgroundColor = "#64748b";
                chatIndicator.style.animation = "none";
                chatTitleText.innerText = "Archive Discussion Board";
            }
        }

        // 2. Fetch User Profile Identity
        function loadUserProfile() {
            fetch('https://proxy-test-three.vercel.app/api/proxy?action=profile', {
                headers: { 'Authorization': `Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjozMjMwNTYxLCJhcHBfaWQiOiIxNzcyMTAwNjAwIiwiZGV2aWNlX2lkIjoiMmNmZGVhZWEtYWI2Mi00MWY4LTlmN2QtNjU2ODMzNGUxODI2IiwicGxhdGZvcm0iOiIzIiwidXNlcl90eXBlIjoxLCJpYXQiOjE3Nzk4ODU3MzAsImV4cCI6MTc4MjQ3NzczMH0.AeKMUiNGAeqXkMixTmyd6j6HM3gauNyafeba3fvPvWg` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success && data.data && data.data[0]) {
                    const profile = data.data[0];
                    currentStudent.name = profile.name || "Student";
                    appendSystemMessage(`Verified profile identity frame for user: ${currentStudent.name}`);
                }
                // Run calculations loop instantly following user data validation
                calculateTimelineClock();
            })
            .catch(err => {
                console.error(err);
                appendSystemMessage("Profile registry check bypassed. Proceeding anonymously.");
                calculateTimelineClock();
            });
        }

        // 3. Establish Connection to the Live MQTT Broker Node
        function connectToLiveChat() {
            mqttClient = new Paho.MQTT.Client(`wss://${STREAM_CONFIG.mqttHost}/mqtt`, currentStudent.id);
            
            mqttClient.onConnectionLost = (resp) => { 
                if(resp.errorCode !== 0) appendSystemMessage("Channel disconnected: " + resp.errorMessage); 
            };
            
            mqttClient.onMessageArrived = (msg) => {
                try {
                    const payload = JSON.parse(msg.payloadString);
                    displayMessage(payload.name || payload.sender || "Student", payload.message || payload.text);
                } catch(e) {
                    displayMessage("Student", msg.payloadString);
                }
            };

            const handshakeOptions = {
                onSuccess: () => {
                    appendSystemMessage("Live chat server connection authenticated successfully.");
                    mqttClient.subscribe(STREAM_CONFIG.publicTopic);
                },
                onFailure: (err) => {
                    appendSystemMessage("Live authentication fallback error. Retrying sync block...");
                    setTimeout(connectToLiveChat, 5000);
                },
                useSSL: true,
                cleanSession: true,
                userName: AUTH_CONFIG.userId,
                password: AUTH_CONFIG.token
            };

            mqttClient.connect(handshakeOptions);
        }

        // 4. Send Message Handler
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();
            if (!messageText) return;

            const payload = {
                message: messageText,
                senderId: currentStudent.id,
                name: currentStudent.name,
                role: "student",
                timestamp: Math.floor(Date.now() / 1000).toString()
            };

            if (isLiveActive && mqttClient && mqttClient.isConnected()) {
                const message = new Paho.MQTT.Message(JSON.stringify(payload));
                message.destinationName = STREAM_CONFIG.publicTopic;
                mqttClient.send(message);
                displayMessage("You", messageText);
            } else {
                // Direct local mirror logging fallback if connection is inactive
                displayMessage(`You (${currentStudent.name})`, messageText);
                if (!isLiveActive) {
                    appendSystemMessage("Message logged locally. Broker node is not listening for input before live window activation.");
                }
            }
            input.value = '';
        }

        function displayMessage(user, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.innerHTML = `<div class="username">${user}</div><div>${text}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendSystemMessage(text) {
            displayMessage("System", text);
        }

        // Execution Boot Initialization Triggers
        loadUserProfile();
        setInterval(calculateTimelineClock, 10000); // Check timeline schedule every 10 seconds
    </script>
</body>
</html>
