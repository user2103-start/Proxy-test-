<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission Jeet - Drona Courses</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#050816;
      color:white;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top left,#5b21b655,transparent 30%),
      radial-gradient(circle at bottom right,#2563eb55,transparent 30%);
      z-index:-1;
    }

    .navbar{
      width:100%;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:sticky;
      top:0;
      z-index:999;
    }

    .logo{
      font-size:28px;
      font-weight:700;
      background:linear-gradient(90deg,#60a5fa,#a78bfa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero{
      padding:80px 8% 40px;
      text-align:center;
    }

    .hero h1{
      font-size:60px;
      line-height:1.1;
      margin-bottom:20px;
      font-weight:700;
    }

    .hero h1 span{
      background:linear-gradient(90deg,#60a5fa,#a78bfa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero p{
      max-width:750px;
      margin:auto;
      color:#cbd5e1;
      font-size:18px;
      line-height:1.8;
    }

    .courses-grid{
      width:100%;
      padding:40px 8% 100px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:35px;
    }

    .course-card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      overflow:hidden;
      backdrop-filter:blur(25px);
      transition:0.4s;
      position:relative;
    }

    .course-card:hover{
      transform:translateY(-10px);
      box-shadow:0 20px 50px rgba(0,0,0,0.4);
    }

    .thumbnail{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:25px;
    }

    .course-title{
      font-size:24px;
      font-weight:600;
      margin-bottom:14px;
      line-height:1.4;
    }

    .price-row{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .offer-price{
      font-size:30px;
      font-weight:700;
      color:#60a5fa;
    }

    .mrp{
      color:#94a3b8;
      text-decoration:line-through;
      font-size:18px;
    }

    .date-box{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:24px;
    }

    .date-item{
      flex:1;
      background:rgba(255,255,255,0.05);
      padding:14px;
      border-radius:18px;
      text-align:center;
    }

    .date-item h4{
      font-size:13px;
      color:#94a3b8;
      margin-bottom:6px;
      font-weight:500;
    }

    .date-item p{
      font-size:14px;
      font-weight:600;
    }

    .explore-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      color:white;
      font-size:17px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .explore-btn:hover{
      transform:scale(1.02);
      opacity:0.95;
    }

    .detail-page{
      display:none;
      padding:40px 8% 100px;
    }

    .back-btn{
      margin-bottom:25px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      color:#93c5fd;
      font-weight:500;
    }

    .detail-banner{
      width:100%;
      height:420px;
      object-fit:cover;
      border-radius:30px;
      margin-bottom:30px;
    }

    .detail-title{
      font-size:48px;
      margin-bottom:20px;
      line-height:1.2;
    }

    .tabs{
      display:flex;
      gap:15px;
      margin:40px 0 30px;
      flex-wrap:wrap;
    }

    .tab{
      padding:14px 24px;
      border-radius:16px;
      background:rgba(255,255,255,0.06);
      cursor:pointer;
      transition:0.3s;
      border:1px solid transparent;
    }

    .tab.active{
      background:linear-gradient(90deg,#2563eb,#7c3aed);
    }

    .tab-content{
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,0.08);
    }

    .content-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .content-card{
      background:rgba(255,255,255,0.05);
      border-radius:22px;
      overflow:hidden;
      cursor:pointer;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.06);
    }

    .content-card:hover{
      transform:translateY(-5px);
    }

    .content-card img{
      width:100%;
      height:150px;
      object-fit:cover;
    }

    .content-card div{
      padding:18px;
    }

    .content-card p{
      font-size:16px;
      line-height:1.5;
    }

    .loader{
      text-align:center;
      padding:60px;
      font-size:20px;
      color:#cbd5e1;
    }

    .video-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.8);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
      padding:20px;
    }

    .video-box{
      width:100%;
      max-width:900px;
      background:#000;
      border-radius:20px;
      overflow:hidden;
      position:relative;
    }

    .close-video{
      position:absolute;
      top:10px;
      right:15px;
      color:white;
      font-size:28px;
      cursor:pointer;
      z-index:5;
    }

    iframe{
      width:100%;
      height:500px;
      border:none;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:38px;
      }

      .detail-title{
        font-size:32px;
      }

      .detail-banner{
        height:240px;
      }

      iframe{
        height:250px;
      }

    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">MISSION JEET</div>
  </nav>

  <!-- LANDING PAGE -->
  <section id="landingPage">

    <div class="hero">
      <h1>
        Crack JEE & NEET with <span>Drona 2.0</span>
      </h1>

      <p>
        Explore premium JEE & NEET batches with structured content,
        folders, lectures, demo classes and complete learning ecosystem.
      </p>
    </div>

    <div class="courses-grid" id="coursesGrid"></div>

  </section>

  <!-- DETAIL PAGE -->
  <section class="detail-page" id="detailPage">

    <div class="back-btn" onclick="goBack()">
      ← Back to Courses
    </div>

    <img id="detailThumbnail" class="detail-banner"/>

    <h1 class="detail-title" id="detailTitle"></h1>

    <div class="price-row">
      <div class="offer-price" id="detailPrice"></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('overview', this)">
        Overview
      </div>

      <div class="tab" onclick="switchTab('content', this)">
        Content
      </div>

      <div class="tab" onclick="switchTab('demo', this)">
        Demo Lectures
      </div>
    </div>

    <div class="tab-content" id="tabContent"></div>

  </section>

  <!-- VIDEO MODAL -->
  <div class="video-modal" id="videoModal">
    <div class="video-box">
      <div class="close-video" onclick="closeVideo()">✕</div>
      <iframe id="videoFrame" allowfullscreen></iframe>
    </div>
  </div>

  <script>

    // COURSES ARRAY
    const courses = [
      {
        id: 184,
        title: "Drona 2.0 NEET Class 11th",
        thumbnail: "https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/241318_131_drona%202.0%20NEET%20banner%20app.png",
        offer_price: "4999.00",
        mrp: "",
        start_date: "1772821801",
        end_date: "1843410599"
      },
      {
        id: 185,
        title: "Drona 2.0 JEE Class 11th",
        thumbnail: "https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/2967410_131_drona%202.0%20JEE%20banner%20app.png",
        offer_price: "4999.00",
        mrp: "",
        start_date: "1772821801",
        end_date: "1843410599"
      },
      {
        id: 151,
        title: "Drona JEE class 11th",
        thumbnail: "https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7574748_131_Class%2011th%20Mission%20Jeet%20JEE%20App%20Banners.jpg",
        offer_price: "4999.00",
        mrp: "",
        start_date: "1772821801",
        end_date: "1843410599"
      },
      {
        id: 152,
        title: "Drona NEET class 11th",
        thumbnail: "https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/4072473_131_Class%2011th%20Mission%20Jeets%20NEET%20App%20Banners.jpg",
        offer_price: "4999.00",
        mrp: "",
        start_date: "1772821801",
        end_date: "1843410599"
      }
    ];

    const coursesGrid = document.getElementById("coursesGrid");
    const landingPage = document.getElementById("landingPage");
    const detailPage = document.getElementById("detailPage");
    const tabContent = document.getElementById("tabContent");

    let currentCourse = null;
    let currentContent = [];

    // FORMAT DATE
    function formatDate(timestamp){
      return new Date(timestamp * 1000).toLocaleDateString();
    }

    // RENDER COURSES
    function renderCourses(){

      coursesGrid.innerHTML = courses.map(course => `
      
        <div class="course-card">

          <img class="thumbnail" src="${course.thumbnail}" />

          <div class="card-content">

            <h2 class="course-title">
              ${course.title}
            </h2>

            <div class="price-row">
              <div class="offer-price">
                ₹${course.offer_price}
              </div>

              ${
                course.mrp
                ? `<div class="mrp">₹${course.mrp}</div>`
                : ''
              }
            </div>

            <div class="date-box">

              <div class="date-item">
                <h4>Starts</h4>
                <p>${formatDate(course.start_date)}</p>
              </div>

              <div class="date-item">
                <h4>Ends</h4>
                <p>${formatDate(course.end_date)}</p>
              </div>

            </div>

            <button class="explore-btn" onclick="openCourse(${course.id})">
              Explore
            </button>

          </div>

        </div>

      `).join('');
    }

    renderCourses();

    // OPEN COURSE
    async function openCourse(id){

      window.scrollTo(0,0);

      landingPage.style.display = "none";
      detailPage.style.display = "block";

      tabContent.innerHTML = `
        <div class="loader">
          Loading Course...
        </div>
      `;

      try{

        // COURSE API
        const courseRes = await fetch(
          `https://proxy-test-three.vercel.app/api/proxy?action=course&course_id=${id}`
        );

        const courseData = await courseRes.json();

        currentCourse = courseData.data || courseData;

        document.getElementById("detailThumbnail").src =
          currentCourse.thumbnail || '';

        document.getElementById("detailTitle").innerText =
          currentCourse.title || currentCourse.course_name || 'Course';

        document.getElementById("detailPrice").innerText =
          `₹${currentCourse.offer_price || '4999'}`;

        // CONTENT API
        const contentRes = await fetch(
          `https://proxy-test-three.vercel.app/api/proxy?action=content&course_id=${id}`
        );

        const contentData = await contentRes.json();

        currentContent = contentData.data || [];

        renderOverview();

      }catch(err){

        console.log(err);

        tabContent.innerHTML = `
          <div class="loader">
            Failed to load data
          </div>
        `;
      }
    }

    // OVERVIEW TAB
    function renderOverview(){

      tabContent.innerHTML = `

        <div style="line-height:1.9;color:#dbeafe;">

          <h2 style="margin-bottom:18px;">
            ${currentCourse.title || ''}
          </h2>

          <p>
            Premium preparation batch with complete modules,
            recorded lectures, structured content, tests and
            smart learning system.
          </p>

          <br>

          <p>
            Course ID: ${currentCourse.id || ''}
          </p>

          <p>
            Offer Price: ₹${currentCourse.offer_price || ''}
          </p>

        </div>

      `;
    }

    // CONTENT TAB
    function renderContent(data){

      if(!data.length){
        tabContent.innerHTML = `
          <div class="loader">
            No Content Found
          </div>
        `;
        return;
      }

      tabContent.innerHTML = `
        <div class="content-grid">

          ${data.map(item => `

            <div class="content-card"
                 onclick="handleContentClick(
                   '${item.type}',
                   '${item.entity_id}'
                 )">

              <img src="${
                item.data?.thumbnail ||
                'https://cdn-icons-png.flaticon.com/512/3767/3767084.png'
              }"/>

              <div>
                <p>${item.title || 'Untitled'}</p>
              </div>

            </div>

          `).join('')}

        </div>
      `;
    }

    // DEMO TAB
    function renderDemo(){

      const demo = currentContent.filter(item =>
        (item.title || '').toLowerCase().includes('demo')
      );

      renderContent(demo);
    }

    // TAB SWITCH
    function switchTab(type, el){

      document.querySelectorAll('.tab')
      .forEach(tab => tab.classList.remove('active'));

      el.classList.add('active');

      if(type === 'overview'){
        renderOverview();
      }

      if(type === 'content'){
        renderContent(currentContent);
      }

      if(type === 'demo'){
        renderDemo();
      }
    }

    // CONTENT CLICK
    async function handleContentClick(type, entityId){

      if(type === 'folder'){

        tabContent.innerHTML = `
          <div class="loader">
            Opening Folder...
          </div>
        `;

        try{

          const res = await fetch(
            `https://proxy-test-three.vercel.app/api/proxy?action=content&course_id=${currentCourse.id}&folder_id=${entityId}`
          );

          const data = await res.json();

          renderContent(data.data || []);

        }catch(err){

          console.log(err);
        }

      }else{

        try{

          const res = await fetch(
            `https://proxy-test-three.vercel.app/api/proxy?action=video&content_id=${entityId}&course_id=${currentCourse.id}`
          );

          const data = await res.json();

          const videoUrl =
            data?.data?.url ||
            data?.url ||
            '';

          if(videoUrl){

            document.getElementById("videoModal").style.display = "flex";

            document.getElementById("videoFrame").src =
              videoUrl;

          }else{

            alert("Video URL not found");

          }

        }catch(err){

          console.log(err);
          alert("Unable to play video");
        }

      }
    }

    // CLOSE VIDEO
    function closeVideo(){

      document.getElementById("videoModal").style.display = "none";

      document.getElementById("videoFrame").src = "";

    }

    // GO BACK
    function goBack(){

      detailPage.style.display = "none";
      landingPage.style.display = "block";

      window.scrollTo(0,0);

    }

  </script>

</body>
</html>
