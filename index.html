<!DOCTYPE html>
<html>
<head>
  <title>API Test</title>
</head>

<body style="font-family: Arial; padding: 20px;">

  <h2>🔥 Proxy API Test</h2>

  <input id="phone" placeholder="Phone Number" />
  <br><br>

  <button onclick="sendOtp()">Send OTP</button>

  <br><br>

  <input id="otp" placeholder="OTP" />
  <br><br>

  <button onclick="verifyOtp()">Verify OTP</button>

  <pre id="output"></pre>

  <script>
    const BASE_URL = "https://proxy-test-three.vercel.app";

    async function sendOtp() {
      document.getElementById("output").innerText = "Sending OTP...";

      try {
        const res = await fetch(BASE_URL + "/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            phoneNumber: document.getElementById("phone").value,
            username: document.getElementById("phone").value
          })
        });

        const data = await res.json();
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);

      } catch (err) {
        document.getElementById("output").innerText = "ERROR: " + err;
      }
    }

    async function verifyOtp() {
      document.getElementById("output").innerText = "Verifying OTP...";

      try {
        const res = await fetch(BASE_URL + "/api/auth/verify", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            phoneNumber: document.getElementById("phone").value,
            username: document.getElementById("phone").value,
            otp: document.getElementById("otp").value
          })
        });

        const data = await res.json();
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);

      } catch (err) {
        document.getElementById("output").innerText = "ERROR: " + err;
      }
    }
  </script>

</body>
</html>
