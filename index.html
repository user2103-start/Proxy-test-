<!DOCTYPE html>
<html lang="en">

    <title>Mission JEET - JEE & NEET Preparation Platform</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #ffffff;
            overflow-x: hidden;
        }
        
        #root {
            min-height: 100vh;
            width: 100%;
        }
        
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #16a34a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-container.hide {
            display: none;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">

    <script>
        // ============================================================
        // MISSION JEET - COMPLETE PROXY APPLICATION
        // ============================================================
        
        // Hide loader when app is ready
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('initial-loader');
                if (loader) loader.classList.add('hide');
            }, 100);
        });
        
        // ============================================================
        // PROXY SERVICE - Complete working logic
        // ============================================================
        
        class MissionJeetProxy {
            constructor() {
                this.apiBaseUrl = "https://api.thescholarverse.site/missionjeet/auth";
                this.courseApiBase = "https://api.thescholarverse.site/missionjeet/course";
                this.token = null;
                this.user = null;
                this.hlsInstances = new Map();
                
                // Load from localStorage on init
                if (typeof localStorage !== 'undefined') {
                    this.token = localStorage.getItem("token");
                    const user = localStorage.getItem("user");
                    if (user) this.user = JSON.parse(user);
                }
            }

            async request(endpoint, options = {}) {
                const url = endpoint.startsWith('http') ? endpoint : `${this.courseApiBase}${endpoint}`;
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };
                
                const token = this.getToken();
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                
                try {
                    const response = await fetch(url, { ...options, headers });
                    const data = await response.json();
                    return data;
                } catch (error) {
                    console.error(`API Error (${endpoint}):`, error);
                    throw error;
                }
            }

            async checkUser(mobile) {
                return this.request(`${this.apiBaseUrl}/check-user?mobile=${mobile}&device_id=web_proxy`);
            }

            async verifyOTP(mobile, otp, name = "Guest") {
                const data = await this.request(`${this.apiBaseUrl}/verify-otp?mobile=${mobile}&otp=${otp}&device_id=web_proxy&name=${name}`);
                if (data && data.success) {
                    this.setToken(data.data.accessToken);
                    this.setUser(data.data);
                }
                return data;
            }

            setToken(token) {
                this.token = token;
                if (typeof localStorage !== 'undefined') {
                    localStorage.setItem("token", token);
                }
            }

            getToken() {
                if (this.token) return this.token;
                if (typeof localStorage !== 'undefined') {
                    return localStorage.getItem("token");
                }
                return null;
            }

            setUser(user) {
                this.user = user;
                if (typeof localStorage !== 'undefined') {
                    localStorage.setItem("user", JSON.stringify(user));
                }
            }

            getUser() {
                if (this.user) return this.user;
                if (typeof localStorage !== 'undefined') {
                    const user = localStorage.getItem("user");
                    return user ? JSON.parse(user) : null;
                }
                return null;
            }

            logout() {
                this.token = null;
                this.user = null;
                if (typeof localStorage !== 'undefined') {
                    localStorage.removeItem("token");
                    localStorage.removeItem("user");
                }
            }

            isAuthenticated() {
                return !!this.getToken();
            }

            async getAllCourses() {
                return this.request('/all-course');
            }

            async getCoursesByCategory(categoryId) {
                return this.request(`/all-course?cat_id=${categoryId}`);
            }

            async getCourseDetails(courseId) {
                return this.request(`/course-details/${courseId}`);
            }

            async getCourseContent(courseId, folderId = null) {
                let url = `/all-content/${courseId}`;
                if (folderId) url += `?folder_id=${folderId}`;
                return this.request(url);
            }

            async getContentDetails(contentId, batchId) {
                const token = this.getToken();
                const response = await fetch(`${this.courseApiBase}/content-details/${contentId}?batch_id=${batchId}`, {
                    headers: {
                        Authorization: `Bearer ${token}`,
                        Accept: "application/json"
                    }
                });
                return response.json();
            }

            async getClasses(type, courseId) {
                return this.request(`${this.courseApiBase}/classes?type=${type}&id=${courseId}`);
            }

            async submitContactForm(formData) {
                console.log("Contact form:", formData);
                return { success: true, message: "Message sent successfully!" };
            }

            // Toast notifications
            toast = {
                success: (msg) => { console.log(`✅ ${msg}`); alert(msg); return Date.now().toString(); },
                error: (msg) => { console.log(`❌ ${msg}`); alert(msg); return Date.now().toString(); },
                info: (msg) => { console.log(`ℹ️ ${msg}`); return Date.now().toString(); },
                warning: (msg) => { console.log(`⚠️ ${msg}`); return Date.now().toString(); },
                loading: (msg) => { console.log(`⏳ ${msg}`); return Date.now().toString(); },
                promise: (promise) => promise,
                dismiss: (id) => console.log(`Dismiss toast ${id}`)
            };

            // Utility functions
            formatDuration(seconds) {
                if (!seconds || seconds === 0) return "—";
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                return hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
            }

            formatDate(timestamp) {
                if (!timestamp) return "—";
                return new Date(timestamp * 1000).toLocaleString("en-IN", {
                    day: "2-digit",
                    month: "short",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit"
                });
            }

            formatTimeRemaining(seconds) {
                const remaining = Math.max(0, seconds - Math.floor(Date.now() / 1000));
                const hours = Math.floor(remaining / 3600);
                const minutes = Math.floor((remaining % 3600) / 60);
                const secs = remaining % 60;
                if (hours > 0) {
                    return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
                }
                return `${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
            }

            formatTimeToMinutes(seconds) {
                const minutes = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${minutes.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
            }

            extractYouTubeId(url) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            }

            isYouTubeUrl(url) {
                return url && (url.includes("youtube.com") || url.includes("youtu.be"));
            }

            getClassStatus(createdAt, duration) {
                const now = Math.floor(Date.now() / 1000);
                const startTime = parseInt(createdAt);
                const endTime = startTime + duration;
                if (now < startTime) return "upcoming";
                if (now > endTime) return "completed";
                return "live";
            }

            buildCourseUrl(courseId, ref = null) {
                let url = `/private/course/${courseId}`;
                if (ref) url += `?ref=${ref}`;
                return url;
            }

            buildPlayUrl(entityId, courseId) {
                return `/play/${entityId}-${courseId}`;
            }

            calculateDiscountPercentage(mrp, offerPrice) {
                const mrpNum = parseFloat(mrp);
                const offerNum = parseFloat(offerPrice);
                if (mrpNum > 0 && offerNum > 0) {
                    return Math.round(((mrpNum - offerNum) / mrpNum) * 100);
                }
                return 0;
            }

            // HLS Video Player
            initHLSPlayer(videoElement, streamUrl, options = {}) {
                if (typeof Hls === 'undefined') {
                    console.error("HLS.js is not loaded");
                    videoElement.src = streamUrl;
                    return null;
                }

                if (!Hls.isSupported()) {
                    videoElement.src = streamUrl;
                    return null;
                }

                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    ...options
                });

                hls.loadSource(streamUrl);
                hls.attachMedia(videoElement);
                
                const id = Date.now().toString();
                this.hlsInstances.set(id, hls);
                
                return { hls, id };
            }

            destroyHLSPlayer(id) {
                const hls = this.hlsInstances.get(id);
                if (hls) {
                    hls.destroy();
                    this.hlsInstances.delete(id);
                }
            }
        }

        window.missionJeet = new MissionJeetProxy();

        // Login Modal
        function showLoginModal() {
            const modal = document.createElement('div');
            modal.style.cssText = 'position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;';
            modal.innerHTML = `
                <div style="background: white; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 400px;">
                    <h2 style="text-align: center; margin-bottom: 1rem;">Login / Register</h2>
                    <input type="tel" id="login-mobile" placeholder="Enter mobile number" style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 1rem;">
                    <div id="otp-section" style="display: none;">
                        <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                            <input type="text" maxlength="1" class="otp-input" style="width: 3rem; height: 3rem; text-align: center; border: 1px solid #ccc; border-radius: 8px;">
                            <input type="text" maxlength="1" class="otp-input" style="width: 3rem; height: 3rem; text-align: center; border: 1px solid #ccc; border-radius: 8px;">
                            <input type="text" maxlength="1" class="otp-input" style="width: 3rem; height: 3rem; text-align: center; border: 1px solid #ccc; border-radius: 8px;">
                            <input type="text" maxlength="1" class="otp-input" style="width: 3rem; height: 3rem; text-align: center; border: 1px solid #ccc; border-radius: 8px;">
                            <input type="text" maxlength="1" class="otp-input" style="width: 3rem; height: 3rem; text-align: center; border: 1px solid #ccc; border-radius: 8px;">
                            <input type="text" maxlength="1" class="otp-input" style="width: 3rem; height: 3rem; text-align: center; border: 1px solid #ccc; border-radius: 8px;">
                        </div>
                    </div>
                    <button id="login-btn" style="width: 100%; background: #16a34a; color: white; padding: 0.75rem; border: none; border-radius: 8px; cursor: pointer;">Send OTP</button>
                    <button onclick="this.parentElement.parentElement.remove()" style="width: 100%; margin-top: 0.5rem; background: transparent; border: none; cursor: pointer; color: #666;">Cancel</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            const mobileInput = document.getElementById('login-mobile');
            const loginBtn = document.getElementById('login-btn');
            const otpSection = document.getElementById('otp-section');
            let step = 'mobile';
            
            loginBtn.onclick = async () => {
                if (step === 'mobile') {
                    const mobile = mobileInput.value;
                    if (!mobile || mobile.length !== 10) {
                        alert('Enter valid mobile number');
                        return;
                    }
                    loginBtn.textContent = 'Sending...';
                    const result = await window.missionJeet.checkUser(mobile);
                    loginBtn.textContent = 'Verify OTP';
                    if (result && result.success) {
                        step = 'otp';
                        otpSection.style.display = 'block';
                        mobileInput.disabled = true;
                    } else {
                        alert(result?.message || 'Failed to send OTP');
                    }
                } else {
                    const otpInputs = document.querySelectorAll('.otp-input');
                    let otp = '';
                    otpInputs.forEach(input => { otp += input.value; });
                    if (otp.length !== 6) {
                        alert('Enter full OTP');
                        return;
                    }
                    loginBtn.textContent = 'Verifying...';
                    const mobile = mobileInput.value;
                    const result = await window.missionJeet.verifyOTP(mobile, otp, 'User');
                    if (result && result.success) {
                        alert('Login successful!');
                        modal.remove();
                        location.reload();
                    } else {
                        alert(result?.message || 'Invalid OTP');
                        loginBtn.textContent = 'Verify OTP';
                    }
                }
            };
            
            // Auto-focus OTP inputs
            const otpInputs = document.querySelectorAll('.otp-input');
            otpInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value && index < 5) {
                        otpInputs[index + 1].focus();
                    }
                });
            });
        }
        
        // Simple routing
        function handleRouting() {
            const path = window.location.pathname;
            
            // Course detail page
            if (path.startsWith('/private/course/')) {
                const courseId = path.split('/').pop();
                renderCourseDetail(courseId);
                return;
            }
            
            // Product page
            if (path.startsWith('/product/')) {
                const slug = path.split('/').pop();
                renderProductPage(slug);
                return;
            }
            
            // Live classes page
            if (path === '/private/live-classes') {
                renderLiveClasses();
                return;
            }
            
            // Player page
            if (path.startsWith('/play/')) {
                const id = path.split('/').pop();
                renderPlayer(id);
                return;
            }
            
            // Default - home page
            renderApp();
        }

                const course = data?.data;

                                <span style="text-decoration: line-through; color: #999;">₹${course.mrp}</span>
                                <span style="color: #16a34a;">${window.missionJeet.calculateDiscountPercentage(course.mrp, course.offer_price)}% off</span>
                            </div>
                            <button onclick="window.location.href='/private/live-classes'" style="margin-top: 1rem; background: #16a34a; color: white; padding: 0.5rem 1.5rem; border: none; border-radius: 8px; cursor: pointer;">Start Learning</button>

        async function renderProductPage(slug) {

            try {

                const courses = data?.data || [];
                
                root.innerHTML = `

                            <a href="/" style="color: white; text-decoration: none;">← Back to Home</a>
                            <h1 style="color: white; margin-left: 2rem; font-size: 1.25rem; text-transform: capitalize;">${slug.toUpperCase()} Courses</h1>
                        </div>
                        <div style="margin-top: 80px; padding: 2rem;">
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                                ${courses.map(course => `
                                    <div style="border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden;">
                                        <img src="${course.thumbnail || 'https://via.placeholder.com/300x180'}" style="width: 100%; height: 180px; object-fit: cover;">
                                        <div style="padding: 1rem;">
                                            <h3 style="font-weight: bold; margin-bottom: 0.5rem;">${course.title}</h3>
                                            <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                                                <span style="font-weight: bold;">₹${course.offer_price}</span>
                                                <span style="text-decoration: line-through; color: #999;">₹${course.mrp}</span>
                                            </div>
                                            <button onclick="window.location.href='/private/course/${course.id}'" style="width: 100%; background: #16a34a; color: white; padding: 0.5rem; border: none; border-radius: 8px; cursor: pointer;">View Details</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                root.innerHTML = '<div style="text-align: center; padding: 2rem;">Error loading courses</div>';
            }
        }
        
        async function renderLiveClasses() {
            const root = document.getElementById('root');
            root.innerHTML = '<div style="display: flex; justify-content: center; align-items: center; height: 50vh;">Loading live classes...</div>';
            
            try {
                const data = await window.missionJeet.getClasses('live', '177');
                const classes = data?.data || [];
                
                root.innerHTML = `
                    <div style="min-height: 100vh; background: white;">
                        <div style="position: fixed; top: 0; width: 100%; background: #16a34a; z-index: 50; padding: 0 2rem; height: 57px; display: flex; align-items: center;">
                            <a href="/" style="color: white; text-decoration: none;">← Back to Home</a>
                            <h1 style="color: white; margin-left: 2rem; font-size: 1.25rem;">Live Classes</h1>
                        </div>
                        <div style="margin-top: 80px; padding: 2rem;">
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                                ${classes.map(cls => `
                                    <div style="border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden;">
                                        <img src="${cls.thumbnail || 'https://via.placeholder.com/300x180'}" style="width: 100%; height: 180px; object-fit: cover;">
                                        <div style="padding: 1rem;">
                                            <h3 style="font-weight: bold; margin-bottom: 0.5rem;">${cls.title}</h3>
                                            <p style="font-size: 0.75rem; color: #666;">Started: ${window.missionJeet.formatDate(cls.data?.created_at)}</p>
                                            <button onclick="window.location.href='/play/${cls.entity_id}-${cls.course_id}'" style="width: 100%; background: #16a34a; color: white; padding: 0.5rem; border: none; border-radius: 8px; cursor: pointer; margin-top: 0.5rem;">Watch Now</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                root.innerHTML = '<div style="text-align: center; padding: 2rem;">Error loading classes</div>';
            }
        }
        
        function renderPlayer(id) {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div style="min-height: 100vh; background: black;">
                    <div style="position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); z-index: 50; padding: 0.5rem 1rem;">
                        <a href="/private/live-classes" style="color: white; text-decoration: none;">← Back</a>
                    </div>
                    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
                        <video id="video-player" controls style="width: 100%; max-width: 900px; height: auto;" poster="https://via.placeholder.com/800x450?text=Loading...">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </div>
            `;
            
            // For demo, use a sample video URL
            const video = document.getElementById('video-player');
            video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
            video.load();
        }
        
        // Initialize routing
        window.showLoginModal = showLoginModal;
        window.renderCourseDetail = renderCourseDetail;
        window.renderProductPage = renderProductPage;
        window.renderLiveClasses = renderLiveClasses;
        window.renderPlayer = renderPlayer;
        
        // Handle navigation
        window.addEventListener('popstate', handleRouting);
        handleRouting();
        
        console.log("Mission JEET Proxy App Loaded Successfully!");
    </script>
</body>
</html>
