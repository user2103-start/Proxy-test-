<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NextToppers Live</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

.left{
    flex:1;
    display:flex;
    flex-direction:column;
    background:#0f172a;
}

.topbar{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    background:#111827;
    border-bottom:1px solid rgba(255,255,255,.06);
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.live-chip{
    background:red;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
}

.player-container{
    position:relative;
    width:100%;
    height:65vh;
    background:black;
}

.video-js{
    width:100%;
    height:100%;
}

.overlay-top{
    position:absolute;
    top:15px;
    left:15px;
    display:flex;
    gap:10px;
    z-index:5;
}

.overlay-chip{
    background:rgba(0,0,0,.65);
    padding:8px 12px;
    border-radius:12px;
    font-size:13px;
}

.info-section{
    padding:18px;
}

.title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.meta{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.meta-item{
    background:#172036;
    padding:8px 14px;
    border-radius:12px;
    font-size:13px;
}

.right{
    width:380px;
    background:#111827;
    display:flex;
    flex-direction:column;
    border-left:1px solid rgba(255,255,255,.06);
}

.chat-header{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    background:#0f172a;
    border-bottom:1px solid rgba(255,255,255,.06);
}

.chat-title{
    font-size:18px;
    font-weight:bold;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:14px;
}

.msg{
    margin-bottom:14px;
}

.msg-bubble{
    background:#1e293b;
    padding:12px;
    border-radius:18px;
}

.msg-name{
    color:#38bdf8;
    font-size:13px;
    font-weight:bold;
    margin-bottom:6px;
}

.msg-text{
    font-size:15px;
    word-break:break-word;
}

.msg-time{
    margin-top:6px;
    font-size:11px;
    color:#94a3b8;
}

.chat-input{
    padding:12px;
    background:#0f172a;
    border-top:1px solid rgba(255,255,255,.06);
}

.input-wrap{
    display:flex;
    gap:10px;
}

.input-wrap input{
    flex:1;
    border:none;
    outline:none;
    padding:14px;
    border-radius:16px;
    background:#1e293b;
    color:white;
}

.send-btn{
    width:50px;
    border:none;
    border-radius:16px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#logs{
    height:150px;
    overflow:auto;
    background:black;
    color:#00ff88;
    font-size:11px;
    padding:10px;
}

@media(max-width:900px){

    .container{
        flex-direction:column;
        height:auto;
    }

    .right{
        width:100%;
        height:500px;
    }

    .player-container{
        height:260px;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="topbar">

<div class="logo">
NextToppers Live
</div>

<div class="live-chip">
LIVE
</div>

</div>

<div class="player-container">

<video
id="player"
class="video-js vjs-default-skin"
controls
playsinline
></video>

<div class="overlay-top">

<div class="overlay-chip" id="viewerCount">
👀 LIVE
</div>

</div>

</div>

<div class="info-section">

<div class="title" id="title">
Loading...
</div>

<div class="meta">

<div class="meta-item" id="courseId">
Loading...
</div>

<div class="meta-item" id="statusBox">
Loading...
</div>

<div class="meta-item" id="mqttBox">
MQTT Connecting
</div>

</div>

</div>

</div>

<div class="right">

<div class="chat-header">

<div class="chat-title">
Live Chat
</div>

<div>
⚡
</div>

</div>

<div id="chat"></div>

<div class="chat-input">

<div class="input-wrap">

<input
type="text"
id="messageInput"
placeholder="Type message..."
>

<button
class="send-btn"
onclick="sendMessage()"
>
➤
</button>

</div>

</div>

<div id="logs"></div>

</div>

</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>

/* ===================================== */
/* CONFIG */
/* ===================================== */

const API =
"https://proxy-test-three.vercel.app/api/proxy?action=video&content_id=17981&course_id=151";

const DEVICE_ID =
"ae2fa506-85ca-418d-a449-ec5868dc6665";

const DEFAULT_TOKEN =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjozMjMwNTYxLCJhcHBfaWQiOiIxNzcyMTAwNjAwIiwiZGV2aWNlX2lkIjoiYWUyZmE1MDYtODVjYS00MThkLWE0NDktZWM1ODY4ZGM2NjY1IiwicGxhdGZvcm0iOiIzIiwidXNlcl90eXBlIjoxLCJpYXQiOjE3Nzk3MTcyODMsImV4cCI6MTc4MjMwOTI4M30.8GtwQYGKQACNXyz2N_dtrm1YmIeo6f3B81_MXiQf3aU";

let player;
let mqttClient;
let publicTopic = "";
let privateTopic = "";

/* ===================================== */
/* LOG */
/* ===================================== */

function log(text){

    console.log(text);

    const logs =
        document.getElementById("logs");

    logs.innerHTML +=
        `<div>${text}</div>`;

    logs.scrollTop =
        logs.scrollHeight;
}

/* ===================================== */
/* INIT */
/* ===================================== */

async function init(){

    try{

        log("Fetching API...");

        const res =
            await fetch(API);

        const json =
            await res.json();

        if(!json.success){

            log("API FAILED");

            return;
        }

        log("API Loaded");

        const data =
            json.data;

        document
            .getElementById("title")
            .innerText =
            data.title || "Untitled";

        document
            .getElementById("courseId")
            .innerText =
            "Content ID: " + data.id;

        document
            .getElementById("statusBox")
            .innerText =
            data.live_status == 1
            ? "LIVE NOW"
            : "RECORDED";

        publicTopic =
            data
            .mqtt_live_cred
            .public_chat_node;

        privateTopic =
            data
            .mqtt_live_cred
            .private_chat_node;

        log(
            "PUBLIC TOPIC: " +
            publicTopic
        );

        startPlayer(
            data.file_url
        );

        connectMQTT();

    }catch(err){

        console.log(err);

        log(
            "INIT ERROR: " +
            err.message
        );

    }

}

/* ===================================== */
/* PLAYER */
/* ===================================== */

function startPlayer(url){

    log("Starting player...");

    player = videojs("player",{

        controls:true,
        autoplay:false,
        preload:"auto",
        fluid:true,
        liveui:true,

        html5:{
            vhs:{
                overrideNative:true
            }
        }

    });

    player.src({

        src:url,
        type:"application/x-mpegURL"

    });

    player.ready(()=>{

        log(
            "Playback initialized"
        );

    });

    player.on("error",()=>{

        console.log(
            player.error()
        );

        log("HLS ERROR");

    });

}

/* ===================================== */
/* MQTT */
/* ===================================== */

function connectMQTT(){

    const endpoint =
    "wss://mqtt-ws.nexttoppers.com:8084/mqtt";

    log(
        "Trying MQTT: " +
        endpoint
    );

    mqttClient = mqtt.connect(

        endpoint,

        {

            clientId:
                "web_" +
                Math.random()
                .toString(16)
                .substring(2,10),

            username:
                DEVICE_ID,

            password:
                DEFAULT_TOKEN,

            protocolId:"MQTT",

            protocolVersion:4,

            clean:true,

            reconnectPeriod:5000,

            connectTimeout:15000,

            keepalive:60,

            resubscribe:true

        }

    );

    mqttClient.on(
        "connect",
        ()=>{

            log(
                "MQTT CONNECTED"
            );

            document
                .getElementById(
                    "mqttBox"
                )
                .innerText =
                "MQTT CONNECTED";

            mqttClient.subscribe(
                publicTopic
            );

            mqttClient.subscribe(
                privateTopic
            );

            log(
                "Subscribed Successfully"
            );

        }
    );

    mqttClient.on(
        "message",
        (topic,message)=>{

            try{

                const raw =
                    message.toString();

                const data =
                    JSON.parse(raw);

                if(
                    !data.message
                ) return;

                addMessage(data);

            }catch(err){

                console.log(err);

            }

        }
    );

    mqttClient.on(
        "error",
        (err)=>{

            console.log(err);

            log(
                "MQTT ERROR"
            );

        }
    );

    mqttClient.on(
        "close",
        ()=>{

            log(
                "MQTT CLOSED"
            );

        }
    );

}

/* ===================================== */
/* CHAT */
/* ===================================== */

function addMessage(data){

    const chat =
        document.getElementById(
            "chat"
        );

    const div =
        document.createElement(
            "div"
        );

    div.className =
        "msg";

    const time =
        new Date(
            parseInt(
                data.date ||
                Date.now()
            )
        ).toLocaleTimeString();

    div.innerHTML = `

        <div class="msg-bubble">

            <div class="msg-name">
                ${data.name || "Unknown"}
            </div>

            <div class="msg-text">
                ${data.message}
            </div>

            <div class="msg-time">
                ${time}
            </div>

        </div>

    `;

    chat.appendChild(div);

    chat.scrollTop =
        chat.scrollHeight;

}

/* ===================================== */
/* SEND */
/* ===================================== */

function sendMessage(){

    const input =
        document.getElementById(
            "messageInput"
        );

    const text =
        input.value.trim();

    if(!text) return;

    if(
        !mqttClient ||
        !mqttClient.connected
    ){

        alert(
            "MQTT not connected"
        );

        return;
    }

    const payload = {

        course_id:"151",

        date:
            Date.now().toString(),

        id:
            "msg_" +
            Math.random()
            .toString(36)
            .substring(2,10),

        isPlaying:false,

        message:text,

        name:"Student",

        platform:"1",

        type:"text"
    };

    mqttClient.publish(

        publicTopic,

        JSON.stringify(payload)

    );

    input.value = "";

}

/* ===================================== */

init();

</script>

</body>
</html>
